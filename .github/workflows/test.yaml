name: Test

on:
  pull_request:

jobs:
  build-mod:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with: {submodules: recursive}
    - uses: ./.github/util/build-mod

  # Host (g++) unit tests for the pure runtime-client logic: item decode contract, EquipParamGoods
  # row offsets, id codec vs frozen golden vectors, param-table walk. Platform-independent C++17, so
  # they run on Linux with no submodules -- and now gate PRs (previously they only ran manually).
  host-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Run host unit tests
      run: make test
      working-directory: tests
